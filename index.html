<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VORTEX - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="admin-ui">
    <div class="panel">
        <div class="header">VORTEX ADMIN <button id="copy-link">Copiar Link da Loja</button></div>
        
        <section class="upload-section">
            <input type="text" id="p-name" placeholder="Nome do Produto">
            <input type="number" id="p-price" placeholder="Preço">
            <label class="file-label"> Selecionar Foto
                <input type="file" id="p-file" accept="image/*" style="display:none">
            </label>
            <button id="p-upload" class="btn-main">POSTAR PRODUTO</button>
        </section>

        <section class="chat-section">
            <h3>Mensagens dos Clientes</h3>
            <div id="admin-chat-list"></div>
        </section>

        <section class="inventory">
            <h3>Produtos Ativos</h3>
            <div id="admin-product-list"></div>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        // Função para Copiar Link
        document.getElementById('copy-link').onclick = () => {
            const url = window.location.href.replace('index.html', 'loja.html');
            navigator.clipboard.writeText(url);
            alert("Link da loja copiado!");
        };

        // Upload com Arquivo Real
        document.getElementById('p-upload').onclick = async () => {
            const file = document.getElementById('p-file').files[0];
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;

            if(!file || !name) return alert("Preencha tudo!");

            const storageRef = firebase.storage().ref('produtos/' + file.name);
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();

            db.collection("produtos").add({
                nome: name, preco: price, img: url, time: Date.now()
            });
            alert("Produto enviado com foto!");
        };
    </script>
</body>
</html>
