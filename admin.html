<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin VORTEX</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body style="background:#000;color:white;">
  <h1>Painel Admin</h1>

  <input id="nome" placeholder="Nome do produto">
  <input id="preco" placeholder="Preço">
  <button onclick="addProduto()">Adicionar</button>

  <h2>Produtos</h2>
  <div id="lista"></div>

<script>
firebase.initializeApp({
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO.firebaseapp.com",
  projectId: "SEU_ID"
});

const db = firebase.firestore();

function addProduto(){
  db.collection("produtos").add({
    nome: document.getElementById("nome").value,
    preco: document.getElementById("preco").value
  }).then(()=> location.reload());
}

function carregar(){
  db.collection("produtos").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      let p = doc.data();
      html += `<div>
        ${p.nome} - ${p.preco}
        <button onclick="del('${doc.id}')">X</button>
      </div>`;
    });
    document.getElementById("lista").innerHTML = html;
  })
}

function del(id){
  db.collection("produtos").doc(id).delete().then(()=> location.reload());
}

carregar();
</script>
</body>
</html>
